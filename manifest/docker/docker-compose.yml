version: '3.8'

services:
  aic:
    build:
      context: ../..
      dockerfile: manifest/docker/Dockerfile
      args:
        TARGETOS: linux
        TARGETARCH: amd64
        GOPROXY: https://goproxy.cn,direct
    image: aic:latest
    container_name: aic
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./config:/app/manifest/config:ro
    environment:
      - TZ=Asia/Shanghai
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

  aic-mysql:
    image: mysql:8.0
    container_name: aic-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root123456
      MYSQL_DATABASE: aic
      TZ: Asia/Shanghai
    volumes:
      - mysql_data:/var/lib/mysql
      - ../../resource/sql/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

volumes:
  mysql_data:
